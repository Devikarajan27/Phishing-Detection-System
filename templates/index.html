<!DOCTYPE html>
<html>
<head>
    <title>Phishing Detection System</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;
            padding: 40px;
        }
        .card {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 15px;
            width: 600px;
            margin: auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        input {
            width: 80%;
            padding: 12px;
            margin: 10px;
        }
        button {
            padding: 12px 25px;
            background-color: #2c5364;
            color: white;
            border: none;
            cursor: pointer;
        }
        h2 {
            margin-top: 20px;
        }
    </style>
</head>
<body>

<h1>🔐 Phishing Detection Dashboard</h1>

<div class="card">
    <form method="POST">
        <input type="text" name="url" placeholder="Enter URL here..." required>
        <br>
        <button type="submit">Analyze</button>
    </form>

    {% if result %}
        <h2>Result: {{ result }}</h2>
        <p style="color:green;">Legitimate: {{ legit }}%</p>
        <p style="color:red;">Phishing: {{ phish }}%</p>

        <canvas id="chart"></canvas>

        <script>
            var ctx = document.getElementById('chart').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Legitimate', 'Phishing'],
                    datasets: [{
                        data: [{{ legit }}, {{ phish }}],
                        backgroundColor: ['#28a745', '#dc3545']
                    }]
                }
            });
        </script>
    {% endif %}
</div>

</body>
</html>
